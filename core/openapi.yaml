openapi: 3.0.0
info:
  title: WACAST Core API
  description: WhatsApp Multi-Session Gateway API - Enterprise WhatsApp messaging platform
  version: 1.0.0
  contact:
    name: WACAST Support
    email: support@wacast.io
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8080
    description: Local Development Server
  - url: https://api.wacast.io
    description: Production Server

tags:
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: OTP-based authentication and current user endpoints
  - name: Billing
    description: Billing plan, quota usage, and invoice overview endpoints
  - name: Sessions
    description: WhatsApp session managementx
  - name: Messages
    description: Message operations and queue management
  - name: Server Info
    description: Server status and statistics

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns overall health status of the service
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: UP
                timestamp: 1775787218
                uptime_seconds: 180
                details:
                  database: healthy
                  sessions: true
                  messages: true

  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register user
      description: Create a new user account and send an OTP via WhatsApp.
      operationId: registerAuthUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
            example:
              phone_number: "62812345678"
              full_name: "John Doe"
      responses:
        "200":
          description: OTP sent for registration verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGenericSuccessResponse"

  /api/v1/auth/request-otp:
    post:
      tags:
        - Auth
      summary: Request login OTP
      description: Request a login OTP for an existing user.
      operationId: requestAuthOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthOTPRequest"
            example:
              phone_number: "62812345678"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGenericSuccessResponse"

  /api/v1/auth/verify-otp:
    post:
      tags:
        - Auth
      summary: Verify OTP and login
      description: Verify OTP code and return access and refresh tokens.
      operationId: verifyAuthOTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyOTPRequest"
            example:
              phone_number: "62812345678"
              otp_code: "123456"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyOTPResponse"

  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh auth tokens
      description: Rotate the current refresh token and issue a new access token pair.
      operationId: refreshAuthToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshTokenRequest"
            example:
              refresh_token: "somerandomrefreshtoken"
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyOTPResponse"
        "401":
          description: Invalid or expired refresh token

  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Return the currently authenticated user profile.
      operationId: getCurrentAuthUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Unauthorized

  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      description: Revoke the active persisted session for the current bearer token.
      operationId: logoutAuthUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthGenericSuccessResponse"

  /api/v1/billing/overview:
    get:
      tags:
        - Billing
      summary: Get billing overview
      description: Return the current subscription, quota usage, available plans, and invoice history for the authenticated user.
      operationId: getBillingOverview
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing overview retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingOverviewResponse"
        "401":
          description: Unauthorized

  /api/v1/billing/checkout:
    post:
      tags:
        - Billing
      summary: Checkout billing plan
      description: Select a billing plan, perform a dummy payment, and activate the subscription for the authenticated user.
      operationId: checkoutBillingPlan
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingCheckoutRequest"
            example:
              plan_id: "514a692f-7758-46f8-b831-e070db204404"
      responses:
        "200":
          description: Dummy payment completed and subscription activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingCheckoutApiResponse"
        "404":
          description: Billing plan not found
        "422":
          description: Billing plan is inactive
        "401":
          description: Unauthorized

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes readiness probe - checks if service is ready for traffic
      operationId: readinessCheck
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Kubernetes liveness probe - checks if service is alive
      operationId: livenessCheck
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/sessions:
    get:
      tags:
        - Sessions
      summary: List all active sessions
      description: Returns list of all currently active WhatsApp sessions
      operationId: listSessions
      responses:
        "200":
          description: List of active sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
              example:
                count: 2
                sessions:
                  - device_id: device001
                    status: 1
                    is_active: true
                    last_activity: 1775787200

  /api/v1/sessions/{device_id}:
    get:
      tags:
        - Sessions
      summary: Get session status
      description: Returns current status of a specific WhatsApp session
      operationId: getSessionStatus
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
          description: Device/Session identifier
          example: device001
      responses:
        "200":
          description: Session status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStatusResponse"
        "404":
          description: Session not found

  /api/v1/sessions/{device_id}/qr:
    get:
      tags:
        - Sessions
      summary: Get QR code for pending session
      description: |
        Returns the QR code for a pending WhatsApp session.
        Use `format=json` for metadata and base64 PNG, or `format=png` for the image directly.
      operationId: getSessionQRCode
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, png]
            default: json
      responses:
        "200":
          description: QR code retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionQRCodeResponse"
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: QR code not available for this device

  /api/v1/sessions/initiate:
    post:
      tags:
        - Sessions
      summary: Initiate new WhatsApp session
      description: |
        Start a new WhatsApp session for a device. Returns QR code for scanning.
        QR code is delivered via websocket or webhook.
      operationId: initiateSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateSessionRequest"
            example:
              device_id: device001
              user_id: user123
              phone: "62812345678"
      responses:
        "202":
          description: Session initiated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateSessionResponse"
        "400":
          description: Invalid request body
        "409":
          description: Session already exists for device

  /api/v1/sessions/{device_id}/stop:
    post:
      tags:
        - Sessions
      summary: Stop WhatsApp session
      description: Disconnect and remove an active WhatsApp session
      operationId: stopSession
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
          description: Device/Session identifier
      responses:
        "200":
          description: Session stopped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Session stopped
                  device_id:
                    type: string
        "404":
          description: Session not found

  /api/v1/devices/{device_id}/messages:
    post:
      tags:
        - Messages
      summary: Send text message
      description: Send a text message via an active WhatsApp session
      operationId: sendMessage
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
          description: Device/Session identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
            example:
              target_jid: "62812345678"
              content: "Hello, this is a test message"
              group_id: null
      responses:
        "200":
          description: Message accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request body
        "404":
          description: Session not found

  /api/v1/devices/{device_id}/messages/media:
    post:
      tags:
        - Messages
      summary: Send media message
      description: Send an image, document, audio, or video message
      operationId: sendMediaMessage
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMediaMessageRequest"
            example:
              target_jid: "62812345678"
              media_url: "https://example.com/image.jpg"
              content_type: "image"
              caption: "Check this out!"
      responses:
        "200":
          description: Message accepted and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/devices/{device_id}/messages/scheduled:
    post:
      tags:
        - Messages
      summary: Schedule message
      description: Schedule a message to be sent at a specific time
      operationId: sendScheduledMessage
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendScheduledMessageRequest"
            example:
              target_jid: "62812345678"
              content: "Good morning!"
              scheduled_for: "2026-04-10T08:00:00Z"
      responses:
        "200":
          description: Message scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduledMessageResponse"

  /api/v1/messages/{message_id}/status:
    get:
      tags:
        - Messages
      summary: Get message status
      description: Check delivery and read status of a sent message
      operationId: getMessageStatus
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
          description: Message identifier
      responses:
        "200":
          description: Message status retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageStatusResponse"
        "404":
          description: Message not found

  /api/v1/messages/stats:
    get:
      tags:
        - Messages
      summary: Get message queue statistics
      description: Returns statistics about message queue and delivery
      operationId: getMessageStats
      responses:
        "200":
          description: Queue statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageStatsResponse"

  /api/v1/messages/failed:
    get:
      tags:
        - Messages
      summary: List failed messages
      description: Returns list of messages that failed to deliver
      operationId: getFailedMessages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of results
      responses:
        "200":
          description: List of failed messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FailedMessagesResponse"

  /api/v1/messages/process:
    post:
      tags:
        - Messages
      summary: Manual queue processing
      description: Manually trigger message queue processing (usually automatic)
      operationId: processQueue
      responses:
        "200":
          description: Queue processing triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Queue processing triggered

  /api/v1/info/status:
    get:
      tags:
        - Server Info
      summary: Server status
      description: Returns current server status and active sessions
      operationId: serverStatus
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatusResponse"

  /api/v1/info/stats:
    get:
      tags:
        - Server Info
      summary: Server statistics
      description: Returns detailed server statistics including sessions and messages
      operationId: serverStats
      responses:
        "200":
          description: Server statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [UP, DOWN, NOT_READY, ALIVE]
        timestamp:
          type: integer
          description: Unix timestamp
        uptime_seconds:
          type: integer
          description: Service uptime in seconds
        details:
          type: object
          description: Additional health details

    AuthRegisterRequest:
      type: object
      required:
        - phone_number
        - full_name
      properties:
        phone_number:
          type: string
          example: "62812345678"
        full_name:
          type: string
          example: "John Doe"

    AuthOTPRequest:
      type: object
      required:
        - phone_number
      properties:
        phone_number:
          type: string
          example: "62812345678"

    AuthVerifyOTPRequest:
      type: object
      required:
        - phone_number
        - otp_code
      properties:
        phone_number:
          type: string
          example: "62812345678"
        otp_code:
          type: string
          example: "123456"

    AuthUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone_number:
          type: string
        full_name:
          type: string
        email:
          type: string
          nullable: true
        company_name:
          type: string
          nullable: true
        timezone:
          type: string
        is_verified:
          type: boolean
        is_banned:
          type: boolean
        is_api_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    AuthGenericSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OTP sent
        phone_number:
          type: string
          nullable: true

    AuthVerifyOTPResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
        refresh_expires_in:
          type: integer
        user:
          $ref: "#/components/schemas/AuthUserResponse"

    AuthRefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    AuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        user:
          $ref: "#/components/schemas/AuthUserResponse"

    BillingCheckoutRequest:
      type: object
      required:
        - plan_id
      properties:
        plan_id:
          type: string
          format: uuid

    BillingCheckoutData:
      type: object
      properties:
        subscription:
          $ref: "#/components/schemas/BillingCurrentPlanResponse"
        invoice:
          $ref: "#/components/schemas/BillingInvoiceSummary"
        payment_status:
          type: string
          example: paid
        payment_method:
          type: string
          example: dummy

    BillingCheckoutApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Dummy payment completed and subscription activated
        checkout:
          $ref: "#/components/schemas/BillingCheckoutData"

    BillingCurrentPlanResponse:
      type: object
      properties:
        subscription_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
          format: double
        billing_cycle:
          type: string
          example: monthly
        renewal_date:
          type: string
          format: date-time
          nullable: true
        quota_used:
          type: integer
        quota_limit:
          type: integer
        device_used:
          type: integer
        device_max:
          type: integer
        auto_renew:
          type: boolean
        status:
          type: string
          example: active
        features:
          nullable: true

    BillingUsagePoint:
      type: object
      properties:
        date:
          type: string
          example: 13 Apr
        sent:
          type: integer
        failed:
          type: integer

    BillingPlanSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: number
          format: double
        quota_limit:
          type: integer
        device_max:
          type: integer
        current:
          type: boolean
        is_active:
          type: boolean

    BillingInvoiceSummary:
      type: object
      properties:
        id:
          type: string
        subscription_id:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        plan_name:
          type: string
        amount:
          type: number
          format: double
        status:
          type: string

    BillingOverviewData:
      type: object
      properties:
        current_plan:
          allOf:
            - $ref: "#/components/schemas/BillingCurrentPlanResponse"
          nullable: true
        usage_history:
          type: array
          items:
            $ref: "#/components/schemas/BillingUsagePoint"
        plans:
          type: array
          items:
            $ref: "#/components/schemas/BillingPlanSummary"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/BillingInvoiceSummary"

    BillingOverviewResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        billing:
          $ref: "#/components/schemas/BillingOverviewData"

    SessionListResponse:
      type: object
      properties:
        count:
          type: integer
        sessions:
          type: array
          items:
            type: object
            properties:
              device_id:
                type: string
              status:
                type: integer
                enum: [0, 1, 2]
                description: "0=inactive, 1=active, 2=pending"
              is_active:
                type: boolean

    SessionStatusResponse:
      type: object
      properties:
        device_id:
          type: string
        status:
          type: integer
          enum: [0, 1, 2]
        is_active:
          type: boolean

    SessionQRCodeImageResponse:
      type: object
      properties:
        base64_png:
          type: string
        png_bytes:
          type: integer
        url_format:
          type: string
        direct_url:
          type: string

    SessionQRCodeResponse:
      type: object
      properties:
        device_id:
          type: string
        qr_code_string:
          type: string
        qr_code_image:
          $ref: "#/components/schemas/SessionQRCodeImageResponse"
        status:
          type: integer
          enum: [0, 1, 2]
        message:
          type: string
        instructions:
          type: object
          additionalProperties:
            type: string
        frontend_usage:
          type: object
          additionalProperties:
            type: string

    InitiateSessionRequest:
      type: object
      required:
        - device_id
        - user_id
        - phone
      properties:
        device_id:
          type: string
          description: Unique device identifier
        user_id:
          type: string
          description: User identifier
        phone:
          type: string
          description: Phone number (with country code, e.g., 62812345678)

    InitiateSessionResponse:
      type: object
      properties:
        message:
          type: string
          example: Session initiated
        device_id:
          type: string
        status:
          type: integer
          example: 2
        next_step:
          type: string
        poll_status:
          type: string

    SendMessageRequest:
      type: object
      required:
        - target_jid
        - content
      properties:
        target_jid:
          type: string
          description: Recipient phone number or JID
        content:
          type: string
          description: Message content
        group_id:
          type: string
          nullable: true
          description: Group ID if sending to group
        priority:
          type: integer
          description: Optional queue priority

    SendMediaMessageRequest:
      type: object
      required:
        - target_jid
        - media_url
        - content_type
      properties:
        target_jid:
          type: string
        media_url:
          type: string
          description: URL to media file
        content_type:
          type: string
          enum: [image, document, audio, video, contact, location]
        caption:
          type: string
          nullable: true
          description: Optional caption for media
        group_id:
          type: string
          nullable: true

    SendScheduledMessageRequest:
      type: object
      required:
        - target_jid
        - content
        - scheduled_for
      properties:
        target_jid:
          type: string
        content:
          type: string
        scheduled_for:
          type: string
          format: date-time
          description: ISO 8601 datetime when to send
        group_id:
          type: string
          nullable: true

    MessageResponse:
      type: object
      properties:
        message_id:
          type: string
        status:
          type: string
          enum: [pending, sent, delivered, read, failed]
        timestamp:
          type: integer

    ScheduledMessageResponse:
      type: object
      properties:
        message_id:
          type: string
        status:
          type: string
          example: scheduled
        scheduled_for:
          type: string
          format: date-time

    MessageStatusResponse:
      type: object
      properties:
        message_id:
          type: string
        status:
          type: string
          enum: [pending, sent, delivered, read, failed]
        timestamp:
          type: integer

    MessageStatsResponse:
      type: object
      properties:
        total_sent:
          type: integer
        total_received:
          type: integer
        total_failed:
          type: integer
        pending:
          type: integer
        avg_latency_ms:
          type: number

    FailedMessagesResponse:
      type: object
      properties:
        count:
          type: integer
        messages:
          type: array
          items:
            type: object
            properties:
              message_id:
                type: string
              device_id:
                type: string
              target_jid:
                type: string
              content:
                type: string
              retry_count:
                type: integer
              max_retries:
